<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />

<title>계명태권도 | 아이의 자신감과 안전이 자라는 곳</title>

<meta property="og:title" content="계명태권도" />
<meta property="og:description" content="아이의 자신감과 안전이 자라는 곳" />
<meta property="og:image" content="https://static.wixstatic.com/media/abf917_90d293f61d704e2a804fc61d932aad41~mv2.png" />

<style>
:root{
  --ink:#0f172a;
  --muted:#475569;
  --line:#e2e8f0;
  --radius:28px;
  --max:1000px;
}

body{
  margin:0;
  font-family: system-ui, -apple-system, "Noto Sans KR", sans-serif;
  background:#f8fafc;
  color:var(--ink);
}

.wrap{
  max-width:var(--max);
  margin:auto;
  padding:20px 16px 30px;
}

/* 상단 버튼 */
.topbar{
  display:flex;
  justify-content:space-between;
  margin-bottom:14px;
}

.btn{
  padding:10px 14px;
  border-radius:999px;
  text-decoration:none;
  font-weight:800;
  font-size:13px;
  border:1px solid var(--line);
  background:white;
  color:var(--ink);
}

/* HERO */
.hero{
  border-radius:var(--radius);
  overflow:hidden;
  background:white;
  box-shadow:0 18px 50px rgba(0,0,0,.08);
}

.hero img{
  width:100%;
  height:auto;
  display:block;
}

/* 텍스트 영역 */
.heroContent{
  padding:22px;
  text-align:left;
}

.heroContent h1{
  margin:0;
  font-size:22px;
  font-weight:900;
  line-height:1.2;
}

.heroContent p{
  margin:10px 0 18px;
  font-size:14px;
  font-weight:600;
  color:var(--muted);
}

.cta{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.bigBtn{
  display:block;
  text-align:center;
  padding:15px;
  border-radius:18px;
  text-decoration:none;
  font-weight:900;
  font-size:14px;
  background:linear-gradient(135deg,#2563eb,#1e3a8a);
  color:white;
}

.phoneBtn{
  display:block;
  text-align:center;
  padding:13px;
  border-radius:18px;
  text-decoration:none;
  font-weight:900;
  font-size:14px;
  border:1px solid var(--line);
  background:white;
  color:var(--ink);
}

/* 정보 카드 */
.info{
  margin-top:16px;
  padding:18px;
  border-radius:22px;
  background:white;
  border:1px solid var(--line);
}

.info h3{
  margin:0 0 8px;
  font-size:13px;
  font-weight:800;
  color:var(--muted);
}

.info p{
  margin:0 0 14px;
  font-size:14px;
  font-weight:700;
}

.infoRow{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.smallBtn{
  padding:10px 14px;
  border-radius:999px;
  text-decoration:none;
  font-weight:800;
  font-size:13px;
  border:1px solid var(--line);
  background:#f1f5f9;
  color:var(--ink);
}

/* PC에서만 살짝 겹치게 */
@media(min-width:900px){
  .hero{
    position:relative;
  }
  .heroContent{
    position:absolute;
    bottom:25px;
    left:25px;
    right:25px;
    background:rgba(255,255,255,.92);
    backdrop-filter:blur(12px);
    border-radius:22px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
  }
}

/* 인쇄 B5 */
@page{
  size:B5;
  margin:10mm;
}

@media print{
  body{background:white;}
  .topbar{display:none;}
}
</style>
</head>

<body>
<div class="wrap">

<div class="topbar">
  <a class="btn" href="../">안전 허브로</a>
  <a class="btn" href="../pages/about/">운영 안내</a>
</div>

<section class="hero">
  <img src="https://static.wixstatic.com/media/abf917_90d293f61d704e2a804fc61d932aad41~mv2.png" alt="계명태권도">

  <div class="heroContent">
    <h1>아이의 자신감과 안전이 자라는 곳</h1>
    <p>계명태권도 · 유치부·초등 전문<br>
    상담/시간표/사진은 공식 홈페이지에서 확인하세요.</p>

    <div class="cta">
      <a class="bigBtn" href="https://계명태권도.com" target="_blank">
        공식 홈페이지 바로가기 →
      </a>
      <a class="phoneBtn" href="tel:010-4477-2772">
        📞 010-4477-2772 전화 상담
      </a>
    </div>
  </div>
</section>

<section class="info">
  <h3>위치</h3>
  <p>울산 남구 중앙로290번길 53,<br>
  강변센트럴하이츠 상가 2층</p>

  <h3>문의</h3>
  <p>010-4477-2772</p>

  <div class="infoRow">
    <a class="smallBtn" href="https://계명태권도.com" target="_blank">홈페이지</a>
    <a class="smallBtn" target="_blank"
       href="https://maps.google.com/?q=%EC%9A%B8%EC%82%B0%20%EB%82%A8%EA%B5%AC%20%EC%A4%91%EC%95%99%EB%A1%9C290%EB%B2%88%EA%B8%B8%2053">
      지도 열기
    </a>
  </div>
</section>

</div>
</body>
</html>
